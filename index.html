<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queens</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♛</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Home Screen -->
    <div id="screen-home" class="screen active">
      <h1>Queens</h1>
      <p class="subtitle">Create and solve your own puzzles</p>
      <div class="home-buttons">
        <button id="btn-new-board">Create Board</button>
        <button id="btn-play">Play</button>
      </div>
    </div>

    <!-- Designer Screen -->
    <div id="screen-designer" class="screen">
      <div class="screen-header">
        <button class="btn-back" data-target="home">&#8592; Back</button>
        <h2>Board Designer</h2>
      </div>
      <div id="designer-container"></div>
    </div>

    <!-- Player Select Screen -->
    <div id="screen-select" class="screen">
      <div class="screen-header">
        <button class="btn-back" data-target="home">&#8592; Back</button>
        <h2>Select Board</h2>
      </div>
      <div id="board-list"></div>
    </div>

    <!-- Player Game Screen -->
    <div id="screen-player" class="screen">
      <div class="screen-header">
        <button class="btn-back" data-target="select">&#8592; Back</button>
        <h2 id="player-board-name"></h2>
      </div>
      <div id="player-container"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
